<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #35ecd7; }
        h2 { color: #333; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        /* Styling for the first "+" Add Book card */
        .add-card { border: 3px dashed #046f31; background: #e6f7ed; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px; text-decoration: none; color: #046f31; font-weight: bold; border-radius: 8px; box-sizing: border-box; }
        .add-card:hover { background: #d2f1dd; }
        .plus-icon { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Your Seller Dashboard</h2>
    
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" style="background-color: #cc0000; color: white; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer;">Logout</button>
        </form>
    </div>
    
    <div class="grid-container">
        <a href="{% url 'add_product' %}" class="add-card">
            <div class="plus-icon">+</div>
            <div>Add Books</div>
        </a>

        {% for product in books %}
            {% include 'store/_book_card.html' with book=product %}
        {% endfor %}
    </div>

</body>
</html>
