<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #35ecd7; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: rgb(90, 219, 139); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .category { color: #888; font-size: 0.9em; text-transform: uppercase; }
        .price { color: #046f31; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>Welcome to the Store</h1>
    
    <div class="grid">
        {% for product in products %}
            <div class="card">
                <span class="category">{{ product.category.name }}</span>
                <h2>{{ product.name }}</h2>
                <p>{{ product.description }}</p>
                <p class="price">${{ product.price }}</p>
                <p>Stock left: {{ product.stock_left }}</p>
            </div>
        {% empty %}
            <p>No products found. Add some in the admin dashboard!</p>
        {% endfor %}
    </div>

</body>
</html>
