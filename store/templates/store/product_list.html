<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #35ecd7; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 40px;">
        <h1>Welcome to Eco Bookstore</h1>
        
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" style="background-color: #cc0000; color: white; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer;">Logout</button>
        </form>
    </div>
    
    <div class="grid">
        {% for product in products %}
            {% include 'store/_book_card.html' with book=product %}
        {% empty %}
            <p>No products found. Add some in the admin dashboard!</p>
        {% endfor %}
    </div>

</body>
</html>
