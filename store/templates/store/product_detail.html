<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.name }} - Eco Bookstore</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #35ecd7; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 8px; max-width: 500px; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #046f31; text-decoration: none; font-weight: bold; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .book-img { max-width: 100%; height: 300px; object-fit: cover; border-radius: 6px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: block; margin-left: auto; margin-right: auto; }
        .no-cover { height: 300px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #777; margin-bottom: 20px; }
        h1 { margin: 0 0 10px 0; color: #333; font-size: 24px; }
        .price { color: #046f31; font-weight: bold; font-size: 20px; margin-bottom: 10px; }
        .stock { font-size: 14px; color: #666; margin-bottom: 20px; }
        .description { font-size: 15px; color: #444; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; margin-bottom: 25px; }
        
        /* Form inputs styling */
        .qty-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .qty-label { font-weight: bold; color: #333; font-size: 15px; }
        .qty-input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        
        .cart-btn { background-color: #046f31; color: white; width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .cart-btn:hover { background-color: #035425; }
    </style>
</head>
<body>

    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Go Back</a>
        
        {% if book.image %}
            <img src="{{ book.image.url }}" alt="{{ book.name }}" class="book-img">
        {% else %}
            <div class="no-cover">No Cover Available</div>
        {% endif %}

        <h1>{{ book.name }}</h1>
        <p class="price">${{ book.price }}</p>
        <p class="stock"><strong>Available Stock:</strong> {{ book.stock_left }} items</p>
        
        {% if book.description %}
            <p class="description">{{ book.description }}</p>
        {% else %}
            <p class="description" style="color: #999; font-style: italic;">No description provided for this book.</p>
        {% endif %}

        <form method="POST" action="{% url 'add_to_cart' book.id %}">
            {% csrf_token %}
            
            <div class="qty-wrapper">
                <label for="quantity" class="qty-label">Quantity:</label>
                <input type="number" id="quantity" name="quantity" value="1" min="1" max="{{ book.stock_left }}" class="qty-input">
            </div>

            <button type="submit" class="cart-btn">Add to Cart</button>
        </form>
    </div>

</body>
</html>
